commit-msg:
  commands:
    commitlint:
      run: commitlint --edit {1}

# pre-commit owns whole-project format check, lint, and typecheck. Test
# execution is delegated to the Stop hook (agents/hooks/run_related_tests.sh)
# and CI. Per-file fast feedback during edits lives in PostToolUse hooks.
pre-commit:
  parallel: true
  commands:
    # ----- format check -----
    shfmt:
      glob: "*.sh"
      run: shfmt -i 2 -ci -d {all_files}
    nixfmt:
      glob: "*.nix"
      run: bash -c 'mapfile -t files < <(git ls-files "*.nix"); ((${#files[@]} == 0)) || nixfmt --check "${files[@]}"'
    stylua:
      glob: "*.lua"
      run: stylua --check {all_files}
    autocorrect:
      glob: "*.{md,txt}"
      run: autocorrect --lint {all_files}
    ruff-format:
      glob: "*.py"
      run: ruff format --check {all_files}
    dprint:
      glob: "*.{json,toml}"
      run: dprint check --config ~/dprint.json {all_files}
    # ----- lint -----
    shellcheck:
      glob: "*.sh"
      run: shellcheck -x --source-path=SCRIPTDIR {all_files}
    statix:
      glob: "*.nix"
      run: statix check .
    deadnix:
      glob: "*.nix"
      run: deadnix --fail .
    actionlint:
      glob: ".github/workflows/*.yml"
      run: actionlint {all_files}
    ruff-check:
      glob: "*.py"
      run: ruff check {all_files}
    oxlint:
      glob: "*.{js,ts,jsx,tsx}"
      run: oxlint {all_files}
    # ----- typecheck (cross-file) -----
    ty:
      glob: "*.py"
      run: ty check
