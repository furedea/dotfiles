"$schema" = 'https://starship.rs/config-schema.json'
add_newline = true
command_timeout = 1000
format = """$directory\
${custom.jj}\
$docker_context\
$all\
$character"""

[character]
success_symbol = "[\\$](green bold)"
error_symbol = "[\\$](red bold)"

[cmd_duration]
min_time = 3000

[directory]
truncation_length = 3

[custom.jj]
when = "jj root 2>/dev/null || git rev-parse --git-dir 2>/dev/null"
command = "$HOME/.config/starship/jj_prompt.sh"
format = "$output "

[git_branch]
disabled = true

[git_commit]
disabled = true

[git_status]
disabled = true

# --- Modules (alphabetical) ---

[aws]
format = '[$symbol($profile)(\($region\))(\[$duration\])]($style) '

[azure]
format = '[$symbol($subscription)]($style) '

[buf]
format = '[$symbol($version)]($style) '

[bun]
format = '[$symbol($version)]($style) '

[c]
