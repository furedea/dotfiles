name: Release Please

on:
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Create or update release PR
        uses: googleapis/release-please-action@v4.4.0
        with:
          # Replace `simple` with a repo-specific release strategy when needed.
          release-type: simple
          # Use a PAT instead of `GITHUB_TOKEN` if downstream workflows must run
          # on release PRs or release tags created by this action.
          token: ${{ secrets.GITHUB_TOKEN }}
