[project]
name = "project"
version = "0.1.0"
description = ""
readme = "README.md"
requires-python = ">= 3.14"
dependencies = []

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.uv]
managed = true
exclude-newer = "1 week"

[dependency-groups]
dev = [
  "pyright>=1.1.401",
  "pytest>=8.3.5",
  "pytest-mock>=3.0",
  "ruff>=0.12.1",
  "ty>=0.0.1a3",
]

[tool.ruff]
target-version = "py314"
src = ["src", "tests"]
line-length = 119

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true

[tool.ruff.lint] # v0.12.1
select = [
  "AIR", # Airflow-specific best practices
  "FAST", # FastAPI-specific checks
  "YTT", # Version-related checks
  "ANN", # Type annotation rules
  "ASYNC", # Async/await-related issues
  "B", # Bugbear rules for likely bugs and dangerous patterns
  "A", # Builtin shadowing rules
  "C4", # Comprehension improvements
  "CPY", # Copyright header checks
  "DTZ", # Datetime/timezone-related issues
  "T10", # Debugger statement detection
  "DJ", # Django-specific checks
  "FIX", # FIXME/TODO/HACK comment detection
  "FA", # __future__ annotations-related checks
  "INT", # gettext / i18n-related checks
  "LOG", # Logging-related checks
  "G", # General logging format rules
  "PIE", # Miscellaneous unnecessary / suboptimal code patterns
  "PYI", # Stub file (.pyi) rules
  "Q", # Quote style rules
  "SLOT", # __slots__-related checks
  "TID", # Import restrictions / replacements
  "TD", # TODO comment formatting/content rules
  "ARG", # Unused argument rules
  "PTH", # Prefer pathlib over os/path
  "FLY", # String literal joining / static join improvements
  "I", # Import sorting
  "NPY", # NumPy-specific checks
  "PD", # pandas-specific checks
  "PERF", # Performance-related improvements
  "E", # pycodestyle errors
  "W", # pycodestyle warnings
  "DOC", # pydoclint: docstring/signature consistency
  "F", # Pyflakes: unused imports, undefined names, etc.
  "PGH", # pygrep-hooks rules
  "PLC", # Pylint convention rules
  "PLE", # Pylint error rules
  "PLR", # Pylint refactor rules
  "PLW", # Pylint warning rules
  "UP", # pyupgrade rules
  "FURB", # refurb modernization / simplification rules
  "RUF", # Ruff-specific rules
  "INP", # Implicit namespace package rules
]
ignore = [
  "G004", # Allow f-strings in logging calls
  "PLC1901", # Allow direct comparison against empty strings
  "PLR2004", # Allow magic values in comparisons
  "ANN101", # Do not require type annotation for self
  "ANN102", # Do not require type annotation for cls
  "ANN401", # Allow Any
  "ARG002", # Allow unused method arguments
  "INP001", # Allow implicit namespace packages
  "PGH004", # Allow blanket noqa comments
  "B008", # Allow function calls in default arguments (e.g. FastAPI Depends)
  "A002", # Allow function arguments to shadow builtins
  "A003", # Allow class attributes to shadow builtins
  "PLR0913", # Allow functions with many arguments
  "W191", # Allow tabs in indentation
  "E111", # Disable indentation-multiple-of-four enforcement
  "E114", # Disable indentation rule for comments
  "E117", # Disable over-indented check
]
[tool.ty.src]
root = "./src"

[tool.ty.rules]

[tool.pyright]
include = ["src", "tests"] # automatically exclude **/__pycache__, **/.*, **/.venv
stubPath = "stubs"
venvPath = ".venv"
# venv = "venv_name"

pythonVersion = "3.14"
# pythonPlatform = "linux"

executionEnvironments = [{ root = "src/", extraPaths = ["src/"] }]

typeCheckingMode = "standard"
strictListInference = true
strictDictionaryInference = true
strictSetInference = true
reportPropertyTypeMismatch = true
deprecateTypingAliases = true
reportImportCycles = true
reportUnusedImport = "warning"
reportUnusedClass = "warning"
reportUnusedFunction = "warning"
reportUnusedVariable = "warning"
reportDuplicateImport = true
reportUntypedFunctionDecorator = true
reportUntypedClassDecorator = true
reportUntypedBaseClass = true
reportUntypedNamedTuple = true
reportPrivateUsage = true
reportConstantResetting = true
reportDeprecated = "warning"
reportInconsistentConstructor = true
reportMissingSuperCall = "warning" # __init__, __init_subclass__, __enter__, __exit__ の super()
reportInitializedInstanceVariable = true
reportMissingParameterType = true # 関数の引数の型がない場合に警告するかどうか
reportUnknownParameterType = "warning" # 関数の引数の Any 型を警告するかどうか
reportUnknownArgumentType = "warning" # 関数の実引数の Any 型を警告するかどうか
reportUnknownLambdaType = "warning" # ラムダ式の Any 型を警告するかどうか
reportUnknownVariableType = "warning" # 変数の Any 型を警告するかどうか
reportUnknownMemberType = "warning" # メンバの Any 型を警告するかどうか # 外部ライブラリにガンガン刺してくる
reportMissingTypeArgument = true # 必要なジェネリック [] がない場合に警告するかどうか
reportCallInDefaultInitializer = true # デフォルト引数の初期化で関数呼び出しを警告するかどうか
reportUnnecessaryIsInstance = "warning"
reportUnnecessaryCast = "warning"
reportUnnecessaryComparison = "warning"
reportUnnecessaryContains = "warning"
reportImplicitStringConcatenation = "warning"
reportUnusedCallResult = "warning"
reportUnusedExpression = "warning"
reportUnnecessaryTypeIgnoreComment = "warning"
reportMatchNotExhaustive = true # match 文の exhaustive チェック
reportImplicitOverride = "warning" # 特殊メソッドのオーバーライドまでチェックしてしまう
reportShadowedImports = true # import 文のシャドウイング (同名オブジェクトによる上書き)
